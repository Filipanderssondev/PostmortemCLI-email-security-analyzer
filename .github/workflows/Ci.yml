# .github/workflows/ci.yml
# Runs automatically on every push and pull request to main.
# Checks: tests pass + Docker image builds successfully.

name: PostmortemCLI CI

on:
  push:
    branches: ["**"]
  # "**" = every branch, including feature branches
  pull_request:
    branches: [main]


jobs:

#  JOB 1 – Run tests
  test:
    name: Run tests
    runs-on: ubuntu-latest
    # GitHub provides a free Ubuntu machine to run this on

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # Downloads your repo onto the GitHub machine

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
        # Installs Python 3.12 on the GitHub machine

      - name: Install dependencies
        run: pip install -e ".[dev]"
        # Installs your project + all dependencies
        # Same as running pip install -e . locally

      - name: Run tests
        run: pytest tests/ -v
        # Runs all test files in tests/
        # -v = verbose, shows each test by name
        # If any test fails → this job fails → you get an email

#  JOB 2 – Build Docker image
  build:
    name: Build container image
    runs-on: ubuntu-latest
    needs: test
    # "needs: test" = only runs if job 1 passed
    # No point building if tests are broken

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t postmortem .
        # Builds your Dockerfile
        # If the build fails → this job fails → you get notified